# Workflow de GitHub Actions para deploy automático a GitHub Pages
#
# Este workflow se ejecuta cada vez que se hace un push a la rama 'main'.
# Compila el sitio Next.js en modo estático y lo publica en GitHub Pages.

name: Deploy a GitHub Pages

on:
  # Se ejecuta en cada push a main
  push:
    branches: ['main']

  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo permite un deploy a la vez
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: Build estático
        run: npm run build
        env:
          # IMPORTANTE: Esta línea hace que los estilos e imágenes carguen correctamente
          # en GitHub Pages (https://sailingreligion.github.io/chacra-la-peregrina)
          NEXT_PUBLIC_BASE_PATH: /chacra-la-peregrina
          
          # Una vez que conecten el dominio de Squarespace, comentar la línea de arriba
          # (ponerle un # adelante) para que el sitio funcione en la raíz.
          
          NEXT_OUTPUT_MODE: export
          NEXT_PUBLIC_SITE_URL: https://chacralaperegrina.com
          # Si ya tienen la access key de Web3Forms, pueden agregarla acá:
          # NEXT_PUBLIC_WEB3FORMS_KEY: su_access_key_aqui

      - name: Preparar archivos para GitHub Pages
        run: |
          # GitHub Pages necesita index.html en la raíz
          # Next.js export pone todo en .next/server/app/
          mkdir -p .next/github-pages
          cp -r .next/server/app/. .next/github-pages/
          cp -r .next/static .next/github-pages/_next/static
          # Copiar archivo .nojekyll
          cp public/.nojekyll .next/github-pages/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.next/github-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
